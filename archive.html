<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IML300 - Spring 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #111111;
            --muted: #767676;
            --line: rgba(0, 0, 0, 0.12);
            --border: rgba(0, 0, 0, 0.28);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #ffffff;
            /*            font-family: 'Inter', sans-serif;*/
            font-family: 'JetBrains Mono', monospace;
            */
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .hud {
            position: fixed;
            z-index: 2;
            pointer-events: none;
            color: var(--muted);
            /*    text-transform: uppercase;*/
            font-size: 11px;
            letter-spacing: 0.1em;
            line-height: 1.6;
            white-space: nowrap;
        }

        .hud a {
            color: inherit;
            text-decoration: none;
            pointer-events: auto;
        }

        .hud a:hover {
            color: var(--ink);
        }

        .hud .line-primary {
            color: var(--ink);
            font-weight: 700;
        }

        .hud.top-left {
            top: 28px;
            left: 32px;
        }

        .hud.top-right {
            top: 28px;
            right: 32px;
            text-align: right;
        }

        .hud.bottom-left {
            bottom: 28px;
            left: 32px;
        }

        .hud.bottom-right {
            bottom: 28px;
            right: 32px;
            text-align: right;
        }


        .hud.bottom {
            bottom: 28px;
            right: 32px;
            font-size: 10.5px;
            letter-spacing: 0.14em;
            color: var(--muted);
            text-align: right;
        }

        .boid-link {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            transform: translate3d(0, 0, 0);
            font-size: 90px;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: var(--ink);
            text-decoration: none;
            white-space: nowrap;
            padding: 6px 10px;
            cursor: pointer;
            transition: color 0.4s ease;
        }

        .boid-link:hover {
            /* text-decoration: underline;*/
            /* text-underline-offset: 3px;*/
        }

        @media (max-width: 640px) {
            .hud.top {
                max-width: 220px;
            }

            .hud.bottom {
                display: none;
            }

            .boid-link {
                font-size: 24px;
                padding: 8px 16px;
            }
        }

    </style>
</head>

<body>

    <div class="hud top-left">
        <div class="line-primary">IML300 - Spring 2026</div>
    </div>

    <div class="hud top-right">
        <div class="line-primary">Introduction to Creative Web Programming</div>
    </div>

    <div class="hud bottom-left">
        <div class="line-primary">USC</div>
        <div><a href="https://map.usc.edu/">Media Arts + Practice</a></div>
    </div>

    <div class="hud bottom-right">
        <div>Professor: <a href="https://qianqian-ye.com/">Qianqian Ye</a></div>
        <div>Student Assistant: <a href="https://kelmcao.github.io/iml300/">Kelly Cao</a></div>
    </div>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/addons/p5.dom.min.js"></script>
    <script>
        const SITES = [{
                text: "Jay",
                href: "https://jaycampanell.github.io/iml300/"
            },
            {
                text: "Penelope",
                href: "https://cheun-byte.github.io/iml300"
            },
            {
                text: "Olivia",
                href: "https://owibia.github.io/iml300/final-project/"
            },
            {
                text: "Taro",
                href: "https://taroarthur.github.io/iml300"
            },
            {
                text: "Ella",
                href: "https://yiyunh-dev.github.io/iml300"
            },
            {
                text: "Yijia",
                href: "https://hd1dh.github.io/iml300"
            },
            {
                text: "Chloe",
                href: "https://leeechloe.github.io/IML300/"
            },
            {
                text: "Sophia",
                href: "https://sslent.github.io/iml300/"
            },
            {
                text: "Seneca",
                href: "https://senjammoo.github.io/iml3005/"
            },
            {
                text: "Angelina",
                href: "https://angelinaaa0311.github.io/iml300/Angelina's-Homepage/"
            },
            {
                text: "Megan",
                href: "https://mwelsey.github.io/iml300/"
            },
            {
                text: "Serena",
                href: "https://serenauau.github.io/iml300/final-portfolio"
            },
            {
                text: "Sylvia",
                href: "https://sylviazhen.github.io/IML-300-Portfolio/archive.html"
            }
        ];

        const PERCEPTION = 160;
        const STARTLE_RADIUS = 150;
        const MAX_FORCE = 0.2;
        const MAX_SPEED = 2.8;
        const MIN_SPEED_NEAR = 0.12;
        const COLLISION_PADDING = 4;
        const RESTITUTION = 1.5;

        let boids = [];

        class Boid {
            constructor(el) {
                this.el = el;
                this.pos = createVector(random(windowWidth), random(windowHeight));
                this.vel = p5.Vector.random2D().mult(random(1, MAX_SPEED));
                this.acc = createVector();
                this.maxSpeed = MAX_SPEED;
            }

            flock(others) {
                let ali = createVector(),
                    coh = createVector();
                let aliCount = 0,
                    cohCount = 0;

                for (let other of others) {
                    if (other === this) continue;
                    let d = p5.Vector.dist(this.pos, other.pos);
                    if (d < PERCEPTION && d > 0) {
                        ali.add(other.vel);
                        aliCount++;
                        coh.add(other.pos);
                        cohCount++;
                    }
                }

                if (aliCount > 0) {
                    ali.div(aliCount);
                    ali.setMag(this.maxSpeed);
                    ali.sub(this.vel);
                    ali.limit(MAX_FORCE);
                }
                if (cohCount > 0) {
                    coh.div(cohCount);
                    coh.sub(this.pos);
                    coh.setMag(this.maxSpeed);
                    coh.sub(this.vel);
                    coh.limit(MAX_FORCE * 0.4);
                }

                this.acc.add(ali);
                this.acc.add(coh);
            }

            checkMouse(mx, my, hasMouse) {
                let d = hasMouse ? dist(this.pos.x, this.pos.y, mx, my) : Infinity;

                if (d < STARTLE_RADIUS) {
                    let t = constrain(d / STARTLE_RADIUS, 0, 1);
                    this.maxSpeed = lerp(MIN_SPEED_NEAR, MAX_SPEED, t);
                } else {
                    this.maxSpeed = MAX_SPEED;
                }
            }

            update() {
                this.vel.add(this.acc);
                this.vel.limit(this.maxSpeed);
                let speed = this.vel.mag();
                if (speed > 0.01 && speed < 0.4) {
                    this.vel.mult(0.4 / speed);
                }
                this.pos.add(this.vel);
                this.acc.mult(0);
            }

            edges() {
                let w = this.el.elt.offsetWidth || 100;
                let h = this.el.elt.offsetHeight || 30;

                if (this.pos.x < 0) {
                    this.pos.x = 0;
                    this.vel.x *= -1;
                } else if (this.pos.x > windowWidth - w) {
                    this.pos.x = windowWidth - w;
                    this.vel.x *= -1;
                }

                if (this.pos.y < 0) {
                    this.pos.y = 0;
                    this.vel.y *= -1;
                } else if (this.pos.y > windowHeight - h) {
                    this.pos.y = windowHeight - h;
                    this.vel.y *= -1;
                }
            }

            display() {
                this.el.position(this.pos.x, this.pos.y);
            }
        }

        function setup() {
            noCanvas();

            for (let s of SITES) {
                let a = createA(s.href, s.text, '_blank');
                a.addClass('boid-link');
                a.attribute('rel', 'noopener noreferrer');

                a.mouseOver(() => {
                    let hue = floor(random(360));
                    a.style('color', `hsl(${hue}, 75%, 42%)`);

                });
                a.mouseOut(() => {
                    a.style('color', '');
                });

                boids.push(new Boid(a));
            }
        }

        function resolveCollisions() {
            for (let i = 0; i < boids.length; i++) {
                for (let j = i + 1; j < boids.length; j++) {
                    let a = boids[i],
                        b = boids[j];

                    let aw = a.el.elt.offsetWidth || 100;
                    let ah = a.el.elt.offsetHeight || 30;
                    let bw = b.el.elt.offsetWidth || 100;
                    let bh = b.el.elt.offsetHeight || 30;

                    let pad = COLLISION_PADDING;
                    let ax1 = a.pos.x - pad,
                        ay1 = a.pos.y - pad;
                    let ax2 = a.pos.x + aw + pad,
                        ay2 = a.pos.y + ah + pad;
                    let bx1 = b.pos.x - pad,
                        by1 = b.pos.y - pad;
                    let bx2 = b.pos.x + bw + pad,
                        by2 = b.pos.y + bh + pad;

                    let overlapX = Math.min(ax2, bx2) - Math.max(ax1, bx1);
                    let overlapY = Math.min(ay2, by2) - Math.max(ay1, by1);

                    if (overlapX > 0 && overlapY > 0) {
                        let aCx = a.pos.x + aw / 2,
                            aCy = a.pos.y + ah / 2;
                        let bCx = b.pos.x + bw / 2,
                            bCy = b.pos.y + bh / 2;

                        if (overlapX < overlapY) {
                            let dir = aCx < bCx ? -1 : 1;
                            a.pos.x += dir * (overlapX / 2);
                            b.pos.x -= dir * (overlapX / 2);

                            let relVel = a.vel.x - b.vel.x;
                            if ((dir < 0 && relVel > 0) || (dir > 0 && relVel < 0)) {
                                let impulse = relVel * RESTITUTION * 0.5;
                                a.vel.x -= impulse;
                                b.vel.x += impulse;
                            }
                        } else {
                            let dir = aCy < bCy ? -1 : 1;
                            a.pos.y += dir * (overlapY / 2);
                            b.pos.y -= dir * (overlapY / 2);

                            let relVel = a.vel.y - b.vel.y;
                            if ((dir < 0 && relVel > 0) || (dir > 0 && relVel < 0)) {
                                let impulse = relVel * RESTITUTION * 0.5;
                                a.vel.y -= impulse;
                                b.vel.y += impulse;
                            }
                        }
                    }
                }
            }
        }

        function draw() {
            let hasMouse = mouseX >= 0 && mouseY >= 0 && mouseX <= windowWidth && mouseY <= windowHeight;

            for (let b of boids) {
                b.flock(boids);
                b.checkMouse(mouseX, mouseY, hasMouse);
                b.update();
            }

            resolveCollisions();

            for (let b of boids) {
                b.edges();
                b.display();
            }
        }

    </script>
</body>

</html>
